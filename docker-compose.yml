services:
  backend:
    build: .
    image: haidarjouni/blog_posts_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: blog_posts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blog_posts"]
      interval: 5s
      timeout: 5s
      retries: 10
  frontend:
    build: ./frontend
    image: haidarjouni/blog_posts_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  postgres_data: